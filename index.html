<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand Cube Control</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}
video{
display:none;
}
</style>
</head>
<body>

<video id="video"></video>

<script>

// THREE JS
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let geometry = new THREE.BoxGeometry(1,1,1);
let material = new THREE.MeshNormalMaterial();
let cube = new THREE.Mesh(geometry,material);

scene.add(cube);
camera.position.z = 3;

function animate(){
requestAnimationFrame(animate);

cube.rotation.x += 0.01;
cube.rotation.y += 0.01;

renderer.render(scene,camera);
}

animate();


// HAND TRACKING
const videoElement = document.getElementById("video");

const hands = new Hands({
locateFile: (file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
}
});

hands.setOptions({
maxNumHands:1,
modelComplexity:0,
minDetectionConfidence:0.6,
minTrackingConfidence:0.6
});

hands.onResults(results=>{

if(results.multiHandLandmarks.length>0){

let hand = results.multiHandLandmarks[0];

let indexFinger = hand[8];
let palm = hand[0];

let x = indexFinger.x;
let y = indexFinger.y;

cube.position.x = (x-0.5)*5;
cube.position.y = -(y-0.5)*5;


// jarak telunjuk ke telapak
let dx = indexFinger.x - palm.x;
let dy = indexFinger.y - palm.y;
let dist = Math.sqrt(dx*dx + dy*dy);

// gesture
if(dist < 0.1){
cube.scale.set(2,2,2); // kepalan → besar
}else{
cube.scale.set(1,1,1); // buka → normal
}

}

});


const cameraFeed = new Camera(videoElement,{
onFrame: async ()=>{
await hands.send({image:videoElement});
},
width:640,
height:480
});

cameraFeed.start();

</script>

</body>
</html>
