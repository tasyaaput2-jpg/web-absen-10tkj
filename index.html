<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Flower Full Animation</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0d0d0d;
    overflow:hidden;
    perspective:1000px;
}

/* bunga */
.flower{
    position:relative;
    width:200px;
    height:200px;
    transform-style: preserve-3d;
    animation:spin 12s linear infinite;
}

.petal{
    position:absolute;
    width:90px;
    height:120px;
    background: radial-gradient(circle at 50% 30%, #ff4da6, #ff99cc);
    border-radius:50% 50% 0 0;
    transform-origin:bottom center;
    box-shadow:0 0 20px #ff99cc;
}

.petal:nth-child(1){ transform:rotateY(0deg) translateZ(60px);}
.petal:nth-child(2){ transform:rotateY(45deg) translateZ(60px);}
.petal:nth-child(3){ transform:rotateY(90deg) translateZ(60px);}
.petal:nth-child(4){ transform:rotateY(135deg) translateZ(60px);}
.petal:nth-child(5){ transform:rotateY(180deg) translateZ(60px);}
.petal:nth-child(6){ transform:rotateY(225deg) translateZ(60px);}
.petal:nth-child(7){ transform:rotateY(270deg) translateZ(60px);}
.petal:nth-child(8){ transform:rotateY(315deg) translateZ(60px);}

/* pusat bunga */
.center{
    position:absolute;
    width:70px;
    height:70px;
    background:gold;
    border-radius:50%;
    top:65px;
    left:65px;
    box-shadow:0 0 30px gold;
}

/* batang */
.stem{
    position:absolute;
    width:10px;
    height:200px;
    background:limegreen;
    top:160px;
    left:95px;
    border-radius:5px;
}

/* animasi spin */
@keyframes spin{
    from{transform:rotateY(0deg);}
    to{transform:rotateY(360deg);}
}

/* efek mekar */
@keyframes bloom{
    0%{transform:scaleY(0.2) scaleX(0.2);}
    50%{transform:scaleY(1.2) scaleX(1.2);}
    100%{transform:scaleY(1) scaleX(1);}
}
</style>
</head>
<body>
<div class="flower">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="center"></div>
</div>
<div class="stem"></div>

<script>
// bikin kelopak mekar perlahan
const petals = document.querySelectorAll('.petal');
petals.forEach((petal, i)=>{
    petal.style.animation = `bloom 2s ${i*0.2}s forwards`;
});
</script>
</body>
</html>
